
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{display:flex;height:720px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-secondary);}
.sidebar{width:210px;flex-shrink:0;overflow-y:auto;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:8px 0;}
.sb-group{padding:10px 12px 4px;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);}
.sb-btn{display:block;width:100%;text-align:left;padding:7px 14px;font-size:12.5px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);line-height:1.35;border-left:3px solid transparent;}
.sb-btn:hover{background:var(--color-background-secondary);}
.sb-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;}
.main{flex:1;overflow-y:auto;padding:20px;}
.sec-hdr{margin-bottom:16px;}
.sec-title{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;}
.trade-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.clash-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:10px;overflow:hidden;background:var(--color-background-primary);}
.clash-hdr{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.clash-hdr:hover{background:var(--color-background-secondary);}
.clash-title{font-size:13.5px;font-weight:500;color:var(--color-text-primary);flex:1;}
.clash-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.sev{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;}
.chevron{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.clash-body{padding:14px;border-top:0.5px solid var(--color-border-tertiary);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px;}
.anchor-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:12.5px;line-height:1.6;color:var(--color-text-secondary);margin-bottom:14px;border-left:3px solid #BA7517;}
.res-list{margin-bottom:14px;}
.res-item{margin-bottom:8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.res-hdr{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--color-background-secondary);}
.res-num{width:20px;height:20px;border-radius:50%;background:#185FA5;color:#E6F1FB;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.res-name{font-size:12.5px;font-weight:500;color:var(--color-text-primary);flex:1;}
.effort{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.vo{font-size:10px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#633806;font-weight:500;}
.res-detail{padding:10px 12px;font-size:12px;line-height:1.65;color:var(--color-text-secondary);}
.checks{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
.check-item{display:flex;gap:6px;font-size:11.5px;color:var(--color-text-secondary);line-height:1.5;}
.check-dot{color:#0F6E56;flex-shrink:0;margin-top:2px;}
.validate-list{margin-bottom:14px;}
.val-item{display:flex;gap:6px;margin-bottom:5px;font-size:12px;line-height:1.5;color:var(--color-text-secondary);}
.val-icon{flex-shrink:0;margin-top:2px;color:#534AB7;}
.esc-list{margin-bottom:14px;}
.esc-item{display:flex;gap:6px;margin-bottom:5px;font-size:12px;line-height:1.5;color:var(--color-text-secondary);}
.esc-icon{flex-shrink:0;margin-top:2px;color:#A32D2D;}
.risk-box{background:#FAEEDA;border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;line-height:1.6;color:#412402;border-left:3px solid #EF9F27;}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:12px 0;}
</style>
